<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Code Extractor — Test Runner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eaeaea; padding: 24px; }
    h1 { color: #4CAF50; margin-bottom: 16px; }
    #test-summary { font-size: 18px; margin-bottom: 20px; padding: 12px; background: #16213e; border-radius: 8px; }
    .summary-failed { color: #ef4444; }
    #run-btn { padding: 10px 24px; background: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; margin-bottom: 20px; }
    #run-btn:hover { background: #45a049; }
    #test-output { display: flex; flex-direction: column; gap: 4px; }
    .test-result { padding: 8px 12px; background: #16213e; border-radius: 4px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
    .test-pass { border-left: 3px solid #4CAF50; }
    .test-fail { border-left: 3px solid #ef4444; }
    .test-status { flex-shrink: 0; }
    .test-name { flex: 1; }
    .test-error { color: #ef4444; font-size: 12px; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🧪 Code Extractor — Test Runner</h1>
  <button id="run-btn" onclick="TestRunner.runAll()">Run All Tests</button>
  <div id="test-summary"></div>
  <div id="test-output"></div>

  <script src="../utils/constants.js"></script>
  <script src="../utils/helpers.js"></script>
  <script src="../utils/domUtils.js"></script>
  <script src="../utils/regexPatterns.js"></script>
  <script src="../utils/languageMap.js"></script>
  <script src="../utils/validators.js"></script>
  <script src="../utils/errorHandler.js"></script>
  <script src="../utils/logger.js"></script>
  <script src="../utils/messageHandler.js"></script>
  <script src="../parsers/BaseParser.js"></script>
  <script src="../parsers/ChatGPTParser.js"></script>
  <script src="../parsers/ClaudeParser.js"></script>
  <script src="../parsers/GeminiParser.js"></script>
  <script src="../parsers/OutlierParser.js"></script>
  <script src="../parsers/MistralParser.js"></script>
  <script src="../parsers/PoeParser.js"></script>
  <script src="../parsers/GitHubParser.js"></script>
  <script src="../parsers/StackOverflowParser.js"></script>
  <script src="../parsers/GenericParser.js"></script>
  <script src="../parsers/ParserFactory.js"></script>
  <script src="../core/CodeBlockExtractor.js"></script>
  <script src="../core/FileNameDetector.js"></script>
  <script src="../core/LanguageIdentifier.js"></script>
  <script src="../core/TreeParser.js"></script>
  <script src="../core/ProjectMapper.js"></script>
  <script src="../core/DuplicateHandler.js"></script>
  <script src="../core/ProjectAssembler.js"></script>
  <script src="../core/CodeScanner.js"></script>
  <script src="../generators/ZipGenerator.js"></script>
  <script src="../generators/ReadmeGenerator.js"></script>
  <script src="../generators/DependencyGenerator.js"></script>
  <script src="../generators/TreeVisualizer.js"></script>
  <script src="test-runner.js"></script>
  <script src="test-codeExtractor.js"></script>
  <script src="test-fileDetector.js"></script>
  <script src="test-languageId.js"></script>
  <script src="test-treeParser.js"></script>
  <script src="test-projectMapper.js"></script>
  <script src="test-duplicateHandler.js"></script>
  <script src="test-zipGenerator.js"></script>
</body>
</html>
